name: 自动更新电视源

on:
  schedule:
    # 每天北京时间凌晨2点运行 (UTC时间 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: 运行更新脚本
      run: python checklist.py

    - name: 提交并推送更改
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add itvlist.m3u itvlist.txt README.md valid_ips.json
        # 只有在有文件变动时才提交
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto update tv sources"
        git push
